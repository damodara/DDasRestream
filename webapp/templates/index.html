{% extends "base.html" %}
{% block content %}
<h2>Список push-адресов</h2>
<a href="{{ url_for('add') }}" class="btn btn-success mb-3">Добавить</a>
<a href="{{ url_for('logout') }}" class="btn btn-secondary mb-3 float-end">Выйти</a>
<table class="table table-bordered">
    <thead>
        <tr><th>RTMP URL</th><th>Действия</th></tr>
    </thead>
    <tbody>
        {% for f in files %}
        <tr>
            <td>{{ f.url }}</td>
            <td>
                <a href="{{ url_for('edit', filename=f.name) }}" class="btn btn-sm btn-primary">Редактировать</a>
                <a href="{{ url_for('delete', filename=f.name) }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
